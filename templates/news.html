{% extends "layout.html" %}

{% block title %}الأخبار{% endblock %}

{% block content %}

<div class="news-page container">
    <h1 class="news-title">أخبار المدرسة</h1>

    <div class="news-grid">
        {% for item in news_list %}
        <div class="news-card">
            {% if item['image_path'] %}
            <img src="{{ url_for('static', filename=item['image_path']) }}" alt="صورة الخبر" class="news-thumb">
            {% endif %}

            <div class="card-body">
                <h2>
                    <a href="{{ url_for('news_detail', news_id=item['id']) }}">
                        {{ item['title'] }}
                    </a>
                </h2>

                <p>
                    {{ item['content'][:140] }}...
                </p>
                <a href="{{ url_for('news_detail', news_id=item['id']) }}" class="read-more">
                    اقرأ المزيد
                </a>
            </div>
        </div>
        {% else %}
            <p>لا توجد أخبار حالياً.</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
